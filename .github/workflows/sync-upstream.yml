name: Sync Upstream

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: sync-upstream-main
      cancel-in-progress: false

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/Fwindy/Cli-Proxy-API-Management-Center || git remote set-url upstream https://github.com/Fwindy/Cli-Proxy-API-Management-Center

      - name: Fetch upstream main
        run: git fetch upstream main --tags

      - name: Merge upstream main
        id: merge
        run: |
          set -euo pipefail
          before_sha="$(git rev-parse HEAD)"

          merge_status=0
          git merge --no-ff --no-commit upstream/main || merge_status=$?

          if ! git rev-parse -q --verify MERGE_HEAD >/dev/null; then
            if [ "$merge_status" -ne 0 ]; then
              exit "$merge_status"
            fi

            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git restore --source="$before_sha" --staged --worktree -- README.md

          if git ls-files --error-unmatch CLAUDE.md >/dev/null 2>&1; then
            if git cat-file -e "$before_sha:CLAUDE.md" 2>/dev/null; then
              git restore --source="$before_sha" --staged --worktree -- CLAUDE.md
            else
              git rm -f --ignore-unmatch CLAUDE.md
            fi
          fi

          remaining_conflicts="$(git diff --name-only --diff-filter=U)"
          if [ -n "$remaining_conflicts" ]; then
            echo "Merge conflicts require manual resolution:"
            printf '%s\n' "$remaining_conflicts"
            exit 1
          fi

          git commit --allow-empty -m "Merge upstream/main"
          after_sha="$(git rev-parse HEAD)"

          if [ "$before_sha" = "$after_sha" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release metadata
        if: steps.merge.outputs.changed == 'true'
        id: release_meta
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%d-%H%M%S')"
          short_sha="$(git rev-parse --short HEAD)"
          tag="auto-sync-${timestamp}-${short_sha}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        if: steps.merge.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Bun
        if: steps.merge.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        if: steps.merge.outputs.changed == 'true'
        run: bun install --frozen-lockfile

      - name: Build all-in-one HTML
        if: steps.merge.outputs.changed == 'true'
        run: bun run build
        env:
          VERSION: ${{ steps.release_meta.outputs.tag }}

      - name: Prepare release assets
        if: steps.merge.outputs.changed == 'true'
        run: |
          cd dist
          mv index.html management.html
          ls -lh management.html

      - name: Push merged changes
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main

      - name: Create release
        if: steps.merge.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release_meta.outputs.tag }}" dist/management.html \
            --repo ${{ github.repository }} \
            --target "$(git rev-parse HEAD)" \
            --title "${{ steps.release_meta.outputs.tag }}" \
            --generate-notes
